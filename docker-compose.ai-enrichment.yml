services:
  ai-enrichment-worker:
    build:
      context: .
      dockerfile: Dockerfile.ai-enrichment
    container_name: ai-enrichment-worker
    restart: unless-stopped
    env_file:
      - .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./logs:/app/logs
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
